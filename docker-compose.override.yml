services:
  db:
    ports:
      - "5433:5432"

  api:
    build:
      target: builder
    environment:
      - APP_ENV=dev
    volumes:
      - ./src:/app/src
      - ./alembic:/app/alembic
      - ./tests:/app/tests
    # The command enables hot-reloading with watchmedo
    command: tail -f /dev/null
